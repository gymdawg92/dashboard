<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connecting QuickBooks…</title>
<style>
  :root {
    --bg: #0d0d0d;
    --card: #161616;
    --border: #2a2a2a;
    --text: #f0f0f0;
    --dim: #888;
    --green: #00e5a0;
    --red: #ff5f5f;
    --blue: #4d9fff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 36px 40px;
    max-width: 520px;
    width: 100%;
    text-align: center;
  }
  h1 {
    font-size: 22px;
    font-weight: 600;
    margin: 0 0 12px;
  }
  p {
    color: var(--dim);
    line-height: 1.5;
    font-size: 14px;
    margin: 0 0 16px;
  }
  .spinner {
    width: 36px;
    height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--blue);
    border-radius: 50%;
    margin: 0 auto 20px;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .check {
    font-size: 48px;
    color: var(--green);
    margin-bottom: 16px;
  }
  .x {
    font-size: 48px;
    color: var(--red);
    margin-bottom: 16px;
  }
  .detail {
    margin-top: 16px;
    padding: 12px 14px;
    background: #0d0d0d;
    border: 1px solid var(--border);
    border-radius: 8px;
    text-align: left;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 12px;
    color: var(--dim);
    word-break: break-all;
    white-space: pre-wrap;
  }
  a.btn {
    display: inline-block;
    margin-top: 20px;
    padding: 10px 18px;
    background: var(--blue);
    color: white;
    text-decoration: none;
    border-radius: 8px;
    font-weight: 500;
    font-size: 14px;
  }
  a.btn.secondary {
    background: transparent;
    color: var(--dim);
    border: 1px solid var(--border);
  }
</style>
</head>
<body>
<div class="card" id="card">
  <div class="spinner"></div>
  <h1>Connecting to QuickBooks…</h1>
  <p>Exchanging authorization code for access tokens.</p>
</div>

<script>
const SUPABASE_URL = 'https://fgpiuyhqokkfrgzqjbef.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZncGl1eWhxb2trZnJnenFqYmVmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDU0NTU5MDMsImV4cCI6MjA2MTAzMTkwM30.yHBGGLNMfnAHPPxOl1OoTxOMNUhJKpTU2r0gGVFaUWY';

const card = document.getElementById('card');

function renderSuccess(realmId) {
  card.innerHTML = `
    <div class="check">✓</div>
    <h1>Connected to QuickBooks</h1>
    <p>Your dashboard can now pull live data.</p>
    <div class="detail">Realm ID: ${realmId}</div>
    <a href="/dashboard/" class="btn">Return to Dashboard</a>
  `;
}

function renderError(msg, detail) {
  card.innerHTML = `
    <div class="x">✕</div>
    <h1>Connection failed</h1>
    <p>${msg}</p>
    ${detail ? `<div class="detail">${detail}</div>` : ''}
    <a href="/dashboard/" class="btn secondary">Return to Dashboard</a>
  `;
}

(async () => {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const realmId = params.get('realmId');
  const state = params.get('state');
  const error = params.get('error');

  if (error) {
    renderError('Intuit returned an error.', `${error}: ${params.get('error_description') || ''}`);
    return;
  }

  if (!code || !realmId) {
    renderError('Missing code or realmId in the callback URL.', window.location.search || '(no query string)');
    return;
  }

  // CSRF check: state in URL must match what we stored before redirecting
  const expectedState = localStorage.getItem('qb-oauth-state');
  if (state && expectedState && state !== expectedState) {
    renderError('State mismatch — possible CSRF attempt.', `expected ${expectedState}, got ${state}`);
    return;
  }
  localStorage.removeItem('qb-oauth-state');

  try {
    const res = await fetch(`${SUPABASE_URL}/functions/v1/qb-oauth-exchange`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
      },
      body: JSON.stringify({ code, realmId }),
    });

    const data = await res.json();

    if (!res.ok) {
      renderError('Token exchange failed.', JSON.stringify(data, null, 2));
      return;
    }

    renderSuccess(realmId);
  } catch (err) {
    renderError('Request to Edge Function failed.', err.message);
  }
})();
</script>
</body>
</html>
